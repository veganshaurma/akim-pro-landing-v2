<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="gradStroke" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="64" height="64" rx="14" stroke="url(#gradStroke)" stroke-width="1.5" fill="none"/>

  <!-- А -->
  <path d="M8 46 L16 18 L24 46" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="10.5" y1="36" x2="21.5" y2="36" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- К -->
  <line x1="30" y1="18" x2="30" y2="46" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M30 32 L56 18" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M30 32 L56 46" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
</svg>
